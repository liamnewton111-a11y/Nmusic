            <div className="stat-label" style={{ color:'var(--text3)', marginBottom:0 }}>Year Earned</div>
            <div style={{ width:32, height:32, borderRadius:8, background:'var(--accent-bg)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--accent)' }}><Icon name="wallet" size={16} /></div>
          </div>
          <div className="stat-value" style={{ color: 'var(--accent)' }}>{fmtMoney(totalYear)}</div>
          <div className="stat-sub" style={{ color:'var(--text3)' }}>collected so far</div>
        </div>
        <div className="stat-card" style={{ borderTop: '3px solid var(--blue)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div className="stat-label" style={{ color:'var(--text3)', marginBottom:0 }}>Year Potential</div>
            <div style={{ width:32, height:32, borderRadius:8, background:'var(--blue-bg)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--blue)' }}><Icon name="chart" size={16} /></div>
          </div>
          <div className="stat-value" style={{ color:'var(--blue)' }}>{fmtMoney(totalPotential)}</div>
          <div className="stat-sub" style={{ color:'var(--text3)' }}>if all paid</div>
        </div>
        <div className="stat-card" style={{ borderTop: '3px solid var(--green)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <div className="stat-label" style={{ color:'var(--text3)', marginBottom:0 }}>Collection Rate</div>
            <div style={{ width:32, height:32, borderRadius:8, background:'var(--green-bg)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--green)' }}><Icon name="check" size={16} /></div>
          </div>
          <div className="stat-value" style={{ color: 'var(--green)' }}>{totalPotential ? Math.round(totalYear / totalPotential * 100) : 0}%</div>
          <div style={{ marginTop:10, height:5, background:'var(--bg3)', borderRadius:99 }}>
            <div style={{ height:'100%', width:`${totalPotential ? Math.round(totalYear/totalPotential*100) : 0}%`, background:'var(--green)', borderRadius:99, transition:'width .6s ease' }} />
          </div>
        </div>
      </div>

      {tab === 'monthly' &&
      <div className="card">
          <div className="section-title">Monthly Revenue — {year}</div>
          <div style={{ display: 'flex', gap: 5, alignItems: 'flex-end', height: 200, marginBottom: 12 }}>
            {monthlyData.map((m, i) => {
            const earnH = m.potential ? Math.round(m.earned / maxVal * 185) : 0;
            const potH = m.potential ? Math.round(m.potential / maxVal * 185) : 0;
            const isNow = i === new Date().getMonth() && year === new Date().getFullYear();
            return <div key={m.month} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                {m.earned > 0 && <div style={{ fontSize: 8, color: 'var(--text3)', marginBottom: 2 }}>{fmtMoney(m.earned)}</div>}
                <div style={{ position: 'relative', width: '100%', height: 185, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 2 }}>
                  <div style={{ width: '46%', height: potH, background: 'var(--bg4)', borderRadius: '4px 4px 0 0' }} title={`Potential: ${fmtMoney(m.potential)}`} />
                  <div style={{ width: '46%', height: earnH, background: isNow ? 'var(--accent2)' : 'var(--accent)', borderRadius: '4px 4px 0 0' }} title={`Earned: ${fmtMoney(m.earned)}`} />
                </div>

            <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 10, height: 10, background: 'var(--bg4)', borderRadius: 2 }} /> Potential</span>
          </div>

      }

      {tab === 'schools' &&
      <div className="card">
          <div className="section-title">By School — {year}</div>
          {schoolTotals.map((s) => {const pct = totalYear ? Math.round(s.total / totalYear * 100) : 0;return <div key={s.id} style={{ marginBottom: 14 }}>
            <div className="flex items-center justify-between" style={{ marginBottom: 5 }}>
              <div className="flex items-center gap-8"><div className="school-dot" style={{ background: s.color }} /><span style={{ fontWeight: 600, fontSize: 13 }}>{s.name}</span></div>
              <span style={{ fontWeight: 700, color: 'var(--accent)' }}>{fmtMoney(s.total)} <span style={{ color: 'var(--text3)', fontWeight: 400, fontSize: 12 }}>({pct}%)</span></span>
            </div>
            <div style={{ height: 8, background: 'var(--bg3)', borderRadius: 4 }}><div style={{ height: '100%', width: `${pct}%`, background: s.color, borderRadius: 4, transition: 'width .5s ease' }} /></div>
          </div>;})}
        </div>
      }
    </div>);

}

/* ─── SETTINGS ─── */
function Settings({ schools, lessons, setLessons, payments, settings, setSettings, showToast }) {
  const [icsPreview, setIcsPreview] = useState(null);
  const [icsSchoolId, setIcsSchoolId] = useState(schools[0]?.id || '');
  function handleICS(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const raw = parseICS(ev.target.result);
        const todayStr = toDateStr(new Date());
        const items = raw.map((x) => {
          const sd = parseICSDate(x.start), ed = parseICSDate(x.end);
          if (!sd) return null;
          const dur = ed ? Math.max(15, Math.round((ed - sd) / 60000)) : 60;
          return { summary: x.summary || '(no title)', dateStr: toDateStr(sd), timeStr: `${String(sd.getHours()).padStart(2,'0')}:${String(sd.getMinutes()).padStart(2,'0')}`, duration: dur, selected: true };
        }).filter(Boolean).filter((x) => x.dateStr >= todayStr).sort((a, b) => (a.dateStr + a.timeStr).localeCompare(b.dateStr + b.timeStr));
        if (!items.length) { showToast('No upcoming events found in file'); e.target.value = ''; return; }
        setIcsPreview(items);
      } catch (err) { showToast('Could not read .ics file'); }
    };
    r.readAsText(file);
    e.target.value = '';
  }
  function confirmImport() {
    const school = schools.find((s) => s.id === icsSchoolId);
    if (!school) { showToast('Pick a school first'); return; }
    const chosen = icsPreview.filter((x) => x.selected);
    const newLessons = chosen.map((x) => ({
      id: crypto.randomUUID(),
      studentName: x.summary,
      schoolId: icsSchoolId,
      dayOfWeek: dateFromStr(x.dateStr).getDay(),
      startTime: x.timeStr,
      duration: x.duration,
      frequency: 'once',
      rate: school.rate || 80,
      rateType: 'hourly',
      startDate: x.dateStr,
      createdAt: new Date().toISOString(),
      fromICS: true,
    }));
    setLessons((ls) => [...ls, ...newLessons]);
    showToast(`Imported ${newLessons.length} lesson${newLessons.length !== 1 ? 's' : ''} ✓`);
    setIcsPreview(null);
  }
  function exportData() {
    const data = { schools: load(KEY.schools), lessons: load(KEY.lessons), payments: load(KEY.payments), exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = `noon-music-${toDateStr(new Date())}.json`;a.click();
    showToast('Exported ✓');
  }
  function importData(e) {
    const file = e.target.files[0];if (!file) return;
    const r = new FileReader();r.onload = (ev) => {try {const data = JSON.parse(ev.target.result);if (data.schools) save(KEY.schools, data.schools);if (data.lessons) save(KEY.lessons, data.lessons);if (data.payments) save(KEY.payments, data.payments);showToast('Imported — refresh to reload');} catch {showToast('Invalid file');}};r.readAsText(file);
  }
  function reqNotif() {
    if (!('Notification' in window)) {showToast('Not supported');return;}
    Notification.requestPermission().then((p) => {showToast(p === 'granted' ? 'Notifications enabled ✓' : 'Permission denied');if (p === 'granted') setSettings((s) => ({ ...s, notifEnabled: true }));});
  }

  return (
    <div style={{ maxWidth: 580 }}>
      <div className="card" style={{ marginBottom: 14 }}>
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="bell" size={16} /> Notifications</div>
        <div className="flex items-center justify-between mb-16">
          <div><div style={{ fontWeight: 600, fontSize: 13 }}>Evening reminder</div><div style={{ fontSize: 12, color: 'var(--text3)', marginTop:3, lineHeight:1.5 }}>Shows a <b>browser notification</b> on this device each evening with tomorrow's lessons. The app must be open in a tab for this to work — it does not send emails or texts.</div></div>
          <label className="toggle" style={{flexShrink:0, marginLeft:12}}><input type="checkbox" checked={settings.notifEnabled || false} onChange={(e) => setSettings((s) => ({ ...s, notifEnabled: e.target.checked }))} /><span className="toggle-slider" /></label>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Notification time</label>
            <input className="form-input" type="time" value={settings.notifTime || '20:00'} onChange={(e) => setSettings((s) => ({ ...s, notifTime: e.target.value }))} /></div>
          <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end', gap: 8 }}>
            <button className="btn btn-secondary" onClick={reqNotif}>Request Permission</button>
            <button className="btn btn-ghost" onClick={() => {if (Notification.permission === 'granted') new Notification('Noon Music', 'Test ✓');else showToast('Enable notifications first');}}>Test</button>
          </div>
        </div>
      </div>
      <div className="card" style={{ marginBottom: 14 }}>
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="palette" size={16} /> Appearance</div>
        <div className="flex items-center justify-between">
          <div style={{ fontWeight: 600, fontSize: 13 }}>Theme</div>
          <div className="pill-tabs">
            <button className={`pill-tab${settings.theme === 'dark' ? ' active' : ''}`} onClick={() => setSettings((s) => ({ ...s, theme: 'dark' }))}>Dark</button>
            <button className={`pill-tab${settings.theme === 'light' ? ' active' : ''}`} onClick={() => setSettings((s) => ({ ...s, theme: 'light' }))}>Light</button>
          </div>
        </div>
      </div>
      <div className="card" style={{ marginBottom: 14 }}>
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="upload" size={16} /> Import from iPhone Calendar</div>
        <div style={{ fontSize: 12.5, color: 'var(--text3)', marginBottom: 10, lineHeight: 1.55 }}>
          Export your iPhone Calendar as a <code>.ics</code> file, then upload it here.<br />
          <b>iPhone:</b> share a calendar via iCloud → choose "Public Calendar" → copy link, open it in Safari, then "Save to Files."<br />
          <b>Mac:</b> open Calendar → File → Export → Export…
        </div>
        <label className="btn btn-primary" style={{ cursor: 'pointer' }}>
          ⬆️ Upload .ics file
          <input type="file" accept=".ics,text/calendar" style={{ display: 'none' }} onChange={handleICS} />
        </label>
        <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 8 }}>Only future events are imported, as one-time lessons.</div>
      </div>
      {icsPreview && (
        <div className="modal-overlay" onClick={() => setIcsPreview(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 560 }}>
            <div className="modal-header">
              <div className="modal-title">Import {icsPreview.filter((x) => x.selected).length} event{icsPreview.filter((x) => x.selected).length !== 1 ? 's' : ''}</div>
              <button className="btn btn-ghost btn-sm" onClick={() => setIcsPreview(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Import all as lessons for this school *</label>
                <select className="form-input form-select" value={icsSchoolId} onChange={(e) => setIcsSchoolId(e.target.value)}>
                  <option value="">— pick a school —</option>
                  {schools.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </div>
              <div style={{ maxHeight: 320, overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8 }}>
                {icsPreview.map((x, i) => (
                  <label key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderBottom: '1px solid var(--border)', cursor: 'pointer' }}>
                    <input type="checkbox" checked={x.selected} onChange={(e) => setIcsPreview((p) => p.map((y, j) => j === i ? { ...y, selected: e.target.checked } : y))} style={{ accentColor: 'var(--accent)' }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{x.summary}</div>
                      <div style={{ fontSize: 11, color: 'var(--text3)' }}>{dateFromStr(x.dateStr).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })} · {fmt12(x.timeStr)} · {x.duration}min</div>
                    </div>
                  </label>
                ))}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={() => setIcsPreview(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={confirmImport} disabled={!icsSchoolId || !icsPreview.some((x) => x.selected)}>Import Selected</button>
            </div>
          </div>
        </div>
      )}
      <div className="card">
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="database" size={16} /> Data Backup</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          <button className="btn btn-secondary" onClick={exportData}>⬇️ Export JSON</button>
          <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>⬆️ Import JSON<input type="file" accept=".json" style={{ display: 'none' }} onChange={importData} /></label>
          <button className="btn btn-danger" style={{display:'inline-flex', alignItems:'center', gap:6}} onClick={() => {if (confirm('Clear ALL data?')) {[KEY.schools, KEY.lessons, KEY.payments].forEach((k) => localStorage.removeItem(k));showToast('Cleared');}}}><Icon name="trash" size={14} /> Clear All</button>
        </div>
        <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text3)' }}>{schools.length} schools · {lessons.length} lessons · {Object.keys(payments).length} payment records</div>

            const monthName = ['January','February','March','April','May','June','July','August','September','October','November','December'][mo];
            const days = new Date(yr, mo+1, 0).getDate();
            const items = [];
            for (let d = 1; d <= days; d++) {
              const ds = toDateStr(new Date(yr, mo, d));
              getLessonsOnDate(ds, lessons).forEach(l => {
                const s = schools.find(x => x.id === l.schoolId) || {name:'Unknown'};
                const k = payKey(l.id, ds);
                const p = payments[k];
                items.push({ date: ds, name: l.studentName, school: s.name, duration: l.duration, amt: Math.round(lessonEarnings(l)), isPaid: p?.paid, isCancelled: p?.cancelled, method: p?.method||'', paidAt: p?.paidAt||'' });
              });
            }
            const totalPaid = items.filter(x=>x.isPaid).reduce((s,x)=>s+x.amt,0);
            const totalOwed = items.filter(x=>!x.isPaid&&!x.isCancelled).reduce((s,x)=>s+x.amt,0);
            const rows = items.map(x=>`<tr style="border-bottom:1px solid #eee">

            @media print{body{padding:20px}}</style></head><body>
            <h1>🎵 Noon Music</h1><h2>${monthName} ${yr} — Revenue Report</h2>
            <div class="summary">
              <div class="box"><div class="box-label">Total Lessons</div><div class="box-value">${items.filter(x=>!x.isCancelled).length}</div></div>
              <div class="box"><div class="box-label">Total Paid</div><div class="box-value" style="color:#155724">$${totalPaid}</div></div>
              <div class="box"><div class="box-label">Total Owed</div><div class="box-value" style="color:#721c24">$${totalOwed}</div></div>
            </div>
            <table><thead><tr><th>Date</th><th>Class</th><th>School</th><th style="text-align:right">Amount</th><th style="text-align:center">Status</th></tr></thead><tbody>${rows}</tbody></table>
            <div style="margin-top:24px;font-size:12px;color:#999">Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
            </body></html>`;

            w.document.close();
            setTimeout(()=>w.print(),500);
          }} style={{display:'inline-flex', alignItems:'center', gap:6}}><Icon name="download" size={14} /> Generate PDF Report</button>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 14 }}>
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><span style={{ display:'inline-flex', width:20, height:20, borderRadius:5, alignItems:'center', justifyContent:'center', background:'var(--gold-bg)', color:'var(--gold)', fontSize:10, fontWeight:700 }}>J</span> Jewish Calendar</div>
        <div style={{ fontSize: 12.5, color: 'var(--text3)', lineHeight: 1.6 }}>
          Jewish holidays are calculated automatically for every year using the Hebrew calendar algorithm — they update each year without any action needed. The calendar adjusts for leap years and all holiday variations.
        </div>
      </div>

      <div className="card" style={{ marginBottom: 14 }}>
        <div className="section-title" style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="lock" size={16} /> Access</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div>

    </div>);

}

  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        {items.map((i) => (
          <button key={i.id} className={`bottom-nav-item${page === i.id ? ' active' : ''}`} onClick={() => setPage(i.id)}>
            <div className="bottom-nav-icon"><Icon name={i.icon} size={22} /></div>
            <div>{i.label}</div>
          </button>
        ))}
      </div>
    </nav>
  );
}

/* ─── APP ─── */
function App() {
  const [page, setPage] = useState(() => localStorage.getItem('nm_page') || 'dashboard');
  const [schools, setSchools] = useState(() => load(KEY.schools));
  const [lessons, setLessons] = useState(() => load(KEY.lessons));
  const [payments, setPayments] = useState(() => load(KEY.payments, {}));
  const [settings, setSettings] = useState(() => load(KEY.settings, { theme: 'dark', notifEnabled: false, notifTime: '20:00' }));
  const [toast, setToast] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [calView, setCalView] = useState('week');
  const [calPivot, setCalPivot] = useState(toDateStr(new Date()));

  useEffect(() => {document.documentElement.setAttribute('data-theme', settings.theme || 'dark');save(KEY.settings, settings);}, [settings]);
  useEffect(() => {save(KEY.schools, schools);}, [schools]);
  useEffect(() => {save(KEY.lessons, lessons);}, [lessons]);
  useEffect(() => {save(KEY.payments, payments);}, [payments]);
  useEffect(() => {localStorage.setItem('nm_page', page);}, [page]);

  const showToast = useCallback((msg) => setToast(msg), []);
  const getSchool = useCallback((id) => schools.find((s) => s.id === id) || { name: 'Unknown', color: '#888' }, [schools]);

  function goToCalendar(view, pivot) {
    setCalView(view);setCalPivot(pivot || toDateStr(new Date()));setPage('calendar');
  }
  function goToPayments() { setPage('payments'); }

  // Evening notification check
  useEffect(() => {
    if (!settings.notifEnabled) return;
    const interval = setInterval(() => {
      const now = new Date();
      const cur = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      if (cur !== (settings.notifTime || '20:00')) return;
      const today = toDateStr(now);
      if (localStorage.getItem(KEY.lastNotif) === today) return;
      const tomorrow = new Date(now);tomorrow.setDate(tomorrow.getDate() + 1);
      const tLessons = getLessonsOnDate(toDateStr(tomorrow), lessons);
      if (!tLessons.length) return;
      localStorage.setItem(KEY.lastNotif, today);
      if (Notification.permission === 'granted') {
        const names = [...new Set(tLessons.map((l) => {const s = schools.find((x) => x.id === l.schoolId);return s?.name || '';}))].join(', ');
        new Notification('Noon Music — Tomorrow', { body: `${tLessons.length} lesson${tLessons.length > 1 ? 's' : ''} at: ${names}` });
      }
    }, 60000);
    return () => clearInterval(interval);
  }, [settings, lessons, schools]);

  // Tweaks
  useEffect(() => {
    function h(e) {if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);}
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const nav = [
  { section: 'Overview', items: [{ id: 'dashboard', label: 'Dashboard', icon: 'home' }, { id: 'calendar', label: 'Calendar', icon: 'calendar' }] },
  { section: 'Management', items: [{ id: 'schools', label: 'Schools', icon: 'school' }, { id: 'schedule', label: 'Schedule', icon: 'clock' }, { id: 'payments', label: 'Payments', icon: 'wallet' }] },
  { section: 'Reports', items: [{ id: 'revenue', label: 'Revenue', icon: 'chart' }] },
  { section: 'System', items: [{ id: 'settings', label: 'Settings', icon: 'settings' }] }];

  const titles = { dashboard: 'Dashboard', calendar: 'Calendar', schools: 'Schools', schedule: 'Weekly Schedule', payments: 'Payments', revenue: 'Revenue', settings: 'Settings' };
  const shared = { schools, setSchools, lessons, setLessons, payments, setPayments, settings, setSettings, showToast, getSchool };

  const todayHebrew = useMemo(() => {try {const h = gregorianToHebrew(toDateStr(new Date()));return `${h.day} ${HEB_MONTHS[h.month]}`;} catch {return '';}}, []);

  return (
    <>
      <div className={`sidebar${sidebarOpen ? ' open' : ''}`}>
        <div className="sidebar-logo">
          <div className="logo-mark" style={{ color: '#fff' }}><Icon name="music" size={20} stroke={2.2} /></div>
          <div><div className="logo-text">Noon Music</div><div className="logo-sub">Teacher Dashboard</div></div>
        </div>
        <nav className="sidebar-nav">
          {nav.map((s) =>
          <div key={s.section} className="nav-section">
              <div className="nav-section-label">{s.section}</div>
              {s.items.map((item) =>
            <div key={item.id} className={`nav-item${page === item.id ? ' active' : ''}`} onClick={() => { setPage(item.id); setSidebarOpen(false); }}>
                  <span className="nav-icon"><Icon name={item.icon} size={17} /></span>{item.label}
                </div>
            )}
            </div>
          )}
        </nav>
        <div className="sidebar-footer">
          <div>{new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</div>
          <div style={{ marginTop: 2 }}>{todayHebrew}</div>
        </div>
      </div>

      {/* Mobile sidebar overlay */}
      {sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)}/>}

      <div className="main">
        <div className="header">
          <div className="flex items-center gap-8">
            <button className="hamburger" onClick={() => setSidebarOpen(o => !o)}
              style={{display:'none',alignItems:'center',justifyContent:'center',width:36,height:36,borderRadius:8,background:'var(--bg3)',border:'1px solid var(--border)',cursor:'pointer',fontSize:18,flexShrink:0}}>
              ☰
            </button>
            <div className="header-title">{titles[page] || page}</div>
          </div>
          <div style={{ fontSize: 12, color: 'var(--text3)' }}>{schools.length} schools · {lessons.length} lessons</div>
        </div>
        <div className="page-content">
          {page === 'dashboard' && <Dashboard {...shared} goToCalendar={goToCalendar} goToPayments={goToPayments} />}
          {page === 'calendar' && <Calendar {...shared} calView={calView} setCalView={setCalView} calPivot={calPivot} setCalPivot={setCalPivot} />}
          {page === 'schools' && <Schools {...shared} />}
          {page === 'schedule' && <Schedule {...shared} />}
          {page === 'payments' && <Payments {...shared} />}
          {page === 'revenue' && <Revenue {...shared} />}
          {page === 'settings' && <Settings {...shared} />}
        </div>
      </div>

      <BottomNav page={page} setPage={setPage} />

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}

      <div className={`tweaks-panel${tweaksOpen ? ' open' : ''}`}>
        <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 14, display:'inline-flex', alignItems:'center', gap:6 }}><Icon name="sliders" size={14} /> Tweaks</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12, fontSize: 12, color: 'var(--text2)' }}>
          <span>Light mode</span>
          <label className="toggle"><input type="checkbox" checked={settings.theme === 'light'} onChange={(e) => setSettings((s) => ({ ...s, theme: e.target.checked ? 'light' : 'dark' }))} /><span className="toggle-slider" /></label>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12, fontSize: 12, color: 'var(--text2)' }}>
          <span>Compact rows</span>
          <label className="toggle"><input type="checkbox" onChange={(e) => {document.documentElement.style.setProperty('--tr', e.target.checked ? '0s' : '.18s ease');document.body.style.fontSize = e.target.checked ? '12px' : '14px';}} /><span className="toggle-slider" /></label>
        </div>
        <div className="form-group" style={{ marginBottom: 0 }}>
          <div className="form-label">Accent</div>
          <input type="color" defaultValue="#7c5ce7" style={{ width: '100%', height: 32, borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer' }}
          onChange={(e) => {document.documentElement.style.setProperty('--accent', e.target.value);}} />
        </div>
      </div>
    </>);

}

/* ─── LOCK SCREEN ─── */
const LOCK_KEY = 'nm_unlocked';
const APP_PASSWORD = 'noon2024'; // ← change this to your password

function LockScreen({ onUnlock }) {
  const [pw, setPw] = useState('');
  const [remember, setRemember] = useState(true);
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);
  const [shake, setShake] = useState(false);

  function tryUnlock() {
    if (pw === APP_PASSWORD) {
      if (remember) localStorage.setItem(LOCK_KEY, 'yes');
      onUnlock();
    } else {
      setError(true);
      setShake(true);
      setPw('');
      setTimeout(() => setShake(false), 500);
      setTimeout(() => setError(false), 2000);
    }
  }

  return (
    <div style={{
      position: 'fixed', inset: 0, width: '100%', minHeight: '100vh',
      background: '#0d0d1a', display: 'flex',
      alignItems: 'center', justifyContent: 'center', padding: '20px',
      fontFamily: 'Inter,system-ui,sans-serif', boxSizing: 'border-box'
    }}>
      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)}
          40%{transform:translateX(8px)}
          60%{transform:translateX(-6px)}
          80%{transform:translateX(6px)}
        }
        .lock-card { animation: none }
        .lock-card.shake { animation: shake 0.45s ease }
      `}</style>
      <div className={`lock-card${shake ? ' shake' : ''}`} style={{
        background: '#13132a', border: '1px solid #2a2a52', borderRadius: 20,
        padding: '44px 40px', width: '100%', maxWidth: 380,
        boxShadow: '0 20px 60px rgba(0,0,0,0.5)', textAlign: 'center'
      }}>
        {/* Logo */}
        <div style={{
          width: 56, height: 56, background: '#7c5ce7', borderRadius: 14,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: '#fff', margin: '0 auto 20px'
        }}><Icon name="music" size={26} stroke={2.2} /></div>
        <div style={{ fontSize: 22, fontWeight: 700, color: '#edf2f7', marginBottom: 4 }}>Noon Music</div>
        <div style={{ fontSize: 13, color: '#64748b', marginBottom: 32 }}>Enter your password to continue</div>

        {/* Password field */}
        <div style={{ position: 'relative', marginBottom: 14 }}>
          <input
            type={show ? 'text' : 'password'}
            value={pw}
            onChange={e => { setPw(e.target.value); setError(false); }}
            onKeyDown={e => e.key === 'Enter' && tryUnlock()}
            placeholder="Password"
            autoFocus
            style={{
              width: '100%', background: '#1c1c38', border: `1px solid ${error ? '#ff7675' : '#2a2a52'}`,
              borderRadius: 10, padding: '12px 44px 12px 16px', color: '#edf2f7',
              fontSize: 15, fontFamily: 'inherit', outline: 'none', transition: 'border-color .2s',
              boxSizing: 'border-box'
            }}
          />
          <button onClick={() => setShow(s => !s)} style={{
            position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)',
            background: 'none', border: 'none', cursor: 'pointer', color: '#64748b',
            display:'flex', alignItems:'center', justifyContent:'center', padding:0
          }}><Icon name={show ? 'eye-off' : 'eye'} size={18} /></button>
        </div>

        {error && <div style={{ color: '#ff7675', fontSize: 12, marginBottom: 10 }}>Incorrect password — try again</div>}

        {/* Remember device */}
        <label style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', marginBottom: 24, justifyContent: 'center' }}>
          <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)}
            style={{ width: 16, height: 16, accentColor: '#7c5ce7', cursor: 'pointer' }}/>
          <span style={{ fontSize: 13, color: '#a0aec0' }}>Remember this device</span>
        </label>

        <button onClick={tryUnlock} style={{
          width: '100%', background: '#7c5ce7', color: '#fff', border: 'none',
          borderRadius: 10, padding: '13px 0', fontSize: 15, fontWeight: 600,
          cursor: 'pointer', fontFamily: 'inherit', transition: 'background .2s'
        }}
          onMouseOver={e => e.target.style.background = '#9d7fef'}
          onMouseOut={e => e.target.style.background = '#7c5ce7'}>
          Unlock
        </button>

        <div style={{ marginTop: 20, fontSize: 11, color: '#2a2a52', display:'inline-flex', alignItems:'center', gap:6, justifyContent:'center' }}><Icon name="lock" size={12} /> Private — Noon Music Teacher App</div>
      </div>
    </div>
  );
}

function Root() {
  const [unlocked, setUnlocked] = useState(() => localStorage.getItem(LOCK_KEY) === 'yes');
  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
